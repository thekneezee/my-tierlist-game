<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Tier List & Spin Wheel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        
        /* Views */
        .view-section { display: none; width: 100%; max-width: 1200px; flex-direction: column; align-items: center; }
        .active-view { display: flex; }

        /* --- Main Tier List View --- */
        #main-container { display: flex; flex-direction: row; gap: 20px; width: 100%; }
        #tier-board { flex-grow: 1; display: flex; flex-direction: column; border: 2px solid #000; background: #000; }
        
        /* Tier Rows */
        .tier-row { display: flex; border-bottom: 2px solid #000; min-height: 100px; }
        .tier-label { width: 120px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #000; text-shadow: 1px 1px 2px rgba(255,255,255,0.3); }
        .tier-dropzone { flex-grow: 1; background-color: #1e1e1e; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; padding: 10px; }
        
        /* Tier Colors */
        .s-tier { background-color: #ff7f7f; }
        .a-tier { background-color: #ffbf7f; }
        .b-tier { background-color: #ffff7f; }
        .c-tier { background-color: #7fff7f; }
        .d-tier { background-color: #7fbfff; }

        /* Controls / Buttons */
        #controls { display: flex; flex-direction: column; gap: 15px; width: 200px; }
        
        button { 
            display: block; width: 100%; text-align: center;
            padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; 
            border: none; border-radius: 5px; text-transform: uppercase; transition: opacity 0.2s; 
        }
        button:hover { opacity: 0.8; }
        
        #btn-start { background-color: #e0a0ff; color: #000; }
        #btn-spin-nav { background-color: #b0b0b0; color: #000; }
        #btn-exit { background-color: #ffccb3; color: #000; }

        /* Pool Area */
        #pool-container { width: 100%; margin-top: 20px; border: 2px solid #333; padding: 15px; background-color: #1e1e1e; text-align: center; }
        #pool-container h3 { margin-bottom: 15px; color: #888; font-weight: normal; }
        #image-pool { display: flex; flex-wrap: wrap; gap: 10px; min-height: 120px; justify-content: center; }

        /* Images */
        .draggable-img { width: 90px; height: 90px; object-fit: cover; cursor: grab; border: 2px solid transparent; transition: transform 0.1s; background-color: #fff; }
        .draggable-img:active { cursor: grabbing; transform: scale(1.05); }

        /* --- Wheel View --- */
        #wheel-container { position: relative; width: 600px; height: 600px; margin: 40px auto; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        
        /* Center Spin Button & Pointer */
        #spin-center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border-radius: 50%; background: #000; color: #fff; border: 4px solid #fff; font-size: 24px; font-weight: bold; cursor: pointer; z-index: 10; }
        #spin-center-btn:hover { background: #333; }
        #pointer { position: absolute; top: 50%; right: -25px; transform: translateY(-50%); width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-right: 30px solid #fff; z-index: 5; }

        /* --- Popup View --- */
        #popup-content { background: #fff; color: #000; border: 2px solid #000; padding: 30px; text-align: center; border-radius: 10px; margin-top: 50px; width: 500px; max-width: 90%; }
        #popup-title { border: 1px solid #000; padding: 15px; margin-bottom: 20px; font-size: 24px; font-weight: normal; }
        #popup-img { width: 300px; height: 300px; object-fit: contain; border: 1px solid #ccc; margin-bottom: 20px; background-color: #f9f9f9; }
        .top-bar { display: flex; justify-content: flex-end; width: 100%; padding: 10px 0; }
        .btn-back { background-color: #1b6383; color: white; padding: 10px 30px; }

    </style>
</head>
<body>

    <div id="view-tierlist" class="view-section active-view">
        <div id="main-container">
            <div id="tier-board">
                <div class="tier-row"><div class="tier-label s-tier">S</div><div class="tier-dropzone" data-tier="S"></div></div>
                <div class="tier-row"><div class="tier-label a-tier">A</div><div class="tier-dropzone" data-tier="A"></div></div>
                <div class="tier-row"><div class="tier-label b-tier">B</div><div class="tier-dropzone" data-tier="B"></div></div>
                <div class="tier-row"><div class="tier-label c-tier">C</div><div class="tier-dropzone" data-tier="C"></div></div>
                <div class="tier-row"><div class="tier-label d-tier">D</div><div class="tier-dropzone" data-tier="D"></div></div>
            </div>
            <div id="controls">
                <button id="btn-start">Start Game</button>
                <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                
                <button id="btn-spin-nav">Spin the Wheel</button>
                <button id="btn-exit">Exit Game</button>
            </div>
        </div>
        <div id="pool-container">
            <h3>Space for the Images</h3>
            <div id="image-pool" class="tier-dropzone" data-tier="pool"></div>
        </div>
    </div>

    <div id="view-wheel" class="view-section">
        <div class="top-bar">
            <button class="btn-back" onclick="showView('view-tierlist')">Back</button>
        </div>
        <div id="wheel-container">
            <canvas id="wheel-canvas" width="800" height="800"></canvas>
            <button id="spin-center-btn">Spin</button>
            <div id="pointer"></div>
        </div>
    </div>

    <div id="view-popup" class="view-section">
        <div class="top-bar">
            <button class="btn-back" onclick="showView('view-tierlist')">Back</button>
        </div>
        <div id="popup-content">
            <div id="popup-title">Dark Side of the Moon</div>
            <img id="popup-img" src="" alt="Selected Item">
        </div>
    </div>

    <script>
        // --- Navigation ---
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
        }

        // --- Drag and Drop Logic ---
        let draggedElement = null;

        document.addEventListener('dragstart', (e) => {
            if(e.target.classList.contains('draggable-img')) {
                draggedElement = e.target;
            }
        });

        document.addEventListener('dragend', (e) => {
            draggedElement = null;
        });

        document.querySelectorAll('.tier-dropzone').forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); // allow dropping
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedElement) {
                    zone.appendChild(draggedElement);
                }
            });
        });

        // --- File Upload / Start Game ---
        const btnStart = document.getElementById('btn-start');
        const fileInput = document.getElementById('file-input');
        const imagePool = document.getElementById('image-pool');

        // Trigger file input when clicking Start Game
        btnStart.addEventListener('click', () => {
            fileInput.click();
        });

        // Handle the images when user clicks "Open" / "Abrir"
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            // Loop through selected files
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // Ensure it's an image
                if (!file.type.match('image.*')) continue;

                const reader = new FileReader();
                
                // Create the image element as soon as the file is read
                reader.onload = (function(theFile) {
                    return function(event) {
                        const img = document.createElement('img');
                        // Use base64 data to ensure it renders on the canvas later perfectly
                        img.src = event.target.result; 
                        
                        // Extract filename without extension
                        const rawTitle = theFile.name;
                        img.title = rawTitle.substring(0, rawTitle.lastIndexOf('.')) || rawTitle; 
                        
                        img.className = 'draggable-img';
                        img.draggable = true;
                        
                        // Instantly append to the pool
                        imagePool.appendChild(img);
                    };
                })(file);

                // Start reading the file
                reader.readAsDataURL(file);
            }

            // Safely reset the input value AFTER a short delay so the browser finishes reading
            setTimeout(() => { fileInput.value = ""; }, 500);
        });

        // --- Exit Game ---
        document.getElementById('btn-exit').addEventListener('click', () => {
            if(confirm("Are you sure you want to exit? This will clear all images and tiers.")) {
                document.querySelectorAll('.tier-dropzone').forEach(zone => zone.innerHTML = '');
                currentRotation = 0;
                document.getElementById('wheel-canvas').style.transform = `rotate(0deg)`;
            }
        });

        // --- Wheel Logic ---
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;
        let poolImagesForWheel = [];

        // Colors for slices
        const sliceColors = ['#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#f1c40f', '#e67e22', '#34495e', '#7f8c8d'];

        document.getElementById('btn-spin-nav').addEventListener('click', () => {
            poolImagesForWheel = Array.from(imagePool.querySelectorAll('img'));
            
            if(poolImagesForWheel.length === 0) {
                alert("There are no images left in the pool to spin! Please Start Game and upload images.");
                return;
            }
            
            drawWheel();
            showView('view-wheel');
        });

        function drawWheel() {
            const numSlices = poolImagesForWheel.length;
            const sliceAngle = (2 * Math.PI) / numSlices;
            const radius = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Move origin to center
            ctx.translate(radius, radius);

            for(let i = 0; i < numSlices; i++) {
                // Draw Slice
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = sliceColors[i % sliceColors.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                // Draw Image inside slice
                ctx.save();
                // Rotate to center of the slice
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                // Move towards outer edge
                ctx.translate(radius * 0.65, 0);
                
                // Draw the actual image
                const imgSize = radius * 0.3; // Responsive image size based on canvas size
                try {
                    ctx.drawImage(poolImagesForWheel[i], -imgSize/2, -imgSize/2, imgSize, imgSize);
                } catch(e) {
                    console.error("Image error:", e);
                }
                
                ctx.restore();
            }
            
            // Reset origin back to top-left
            ctx.translate(-radius, -radius);
        }

        document.getElementById('spin-center-btn').addEventListener('click', () => {
            if(isSpinning || poolImagesForWheel.length === 0) return;
            isSpinning = true;

            // Generate a random spin: At least 5 full rotations (1800 deg) + random angle
            const randomExtraDegrees = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + randomExtraDegrees;
            currentRotation += totalSpin;

            // Apply CSS transformation
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Wait for transition to finish (4000ms as set in CSS)
            setTimeout(() => {
                isSpinning = false;
                determineWinner();
            }, 4000);
        });

        function determineWinner() {
            const numSlices = poolImagesForWheel.length;
            const degreesPerSlice = 360 / numSlices;
            
            // The pointer is visually on the right (0 degrees on the canvas).
            // When canvas rotates by R degrees, the angle that falls on the pointer is backwards
            const normalizedRotation = (360 - (currentRotation % 360)) % 360;
            const winningIndex = Math.floor(normalizedRotation / degreesPerSlice);
            
            const winningImage = poolImagesForWheel[winningIndex];

            // Setup Popup
            document.getElementById('popup-title').textContent = winningImage.title;
            document.getElementById('popup-img').src = winningImage.src;

            // Show Popup
            showView('view-popup');
        }
    </script>
</body>
</html>
